<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>RevEdge — Your Revision. Your Edge.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body,#root{height:100%;overflow:hidden}
  body{font-family:'Sora',sans-serif;background:#0a0b16}
  ::-webkit-scrollbar{display:none}
  input,textarea,button,select{font-family:'Sora',sans-serif;border:none;outline:none}
  .tap{transition:transform .12s,opacity .12s}
  .tap:active{transform:scale(0.96);opacity:.82}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{0%{transform:scale(0.85)}70%{transform:scale(1.05)}100%{transform:scale(1)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade-up{animation:fadeUp .35s ease both}
  .fade-in{animation:fadeIn .25s ease both}
  .pop{animation:pop .3s ease both}
  input[type=date]::-webkit-calendar-picker-indicator{opacity:.6;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── CONSTANTS ────────────────────────────────────── */
const INTERVALS=[2,3,5,7,10];
const STAGE_META=[
  {label:"New",color:"#6b6b90"},
  {label:"L1",color:"#8b7fff"},
  {label:"L2",color:"#8b7fff"},
  {label:"L3",color:"#f59e0b"},
  {label:"L4",color:"#f59e0b"},
  {label:"L5",color:"#22d4a0"},
  {label:"✨ Mastered",color:"#22d4a0"},
];
const EMOJIS=["🎓","🧠","⭐","🦁","🦅","🔥","💎","🎯","🏆","🚀","💪","🌟","🐯","🦊","🐉","⚡"];
const EXAM_LIST=[
  {id:"cat",name:"CAT",icon:"🎯",full:"Common Admission Test"},
  {id:"gmat",name:"GMAT",icon:"📐",full:"Graduate Mgmt Admission"},
  {id:"xat",name:"XAT",icon:"✏️",full:"Xavier Aptitude Test"},
  {id:"snap",name:"SNAP",icon:"⚡",full:"Symbiosis Nat'l Aptitude"},
  {id:"nmat",name:"NMAT",icon:"🧠",full:"NMIMS Aptitude Test"},
  {id:"gre",name:"GRE",icon:"🌐",full:"Graduate Record Exam"},
  {id:"upsc",name:"UPSC",icon:"🏛️",full:"Civil Services Exam"},
  {id:"gate",name:"GATE",icon:"⚙️",full:"Graduate Aptitude Test"},
  {id:"jee",name:"JEE",icon:"🔬",full:"Joint Entrance Exam"},
  {id:"neet",name:"NEET",icon:"💊",full:"Medical Entrance Exam"},
  {id:"ca",name:"CA",icon:"💼",full:"Chartered Accountancy"},
  {id:"cfa",name:"CFA",icon:"📊",full:"Chartered Financial Analyst"},
];
const DEFAULT_SECTIONS=[
  {id:"s_varc",name:"VARC",icon:"📖",color:"#8b7fff",desc:"Verbal Ability & Reading Comprehension",topics:[
    {id:"t_rc",name:"Reading Comprehension",subtopics:[
      {id:"st_rc_inf",name:"Inference Questions"},{id:"st_rc_tone",name:"Tone & Attitude"},
      {id:"st_rc_vocab",name:"Vocabulary in Context"},{id:"st_rc_title",name:"Main Idea / Title"},
    ]},
    {id:"t_va",name:"Verbal Ability",subtopics:[
      {id:"st_pj",name:"Para Jumbles (PJ)"},{id:"st_ps",name:"Para Summary (PS)"},
      {id:"st_ooc",name:"Odd One Out (OOC)"},{id:"st_tita",name:"TITA Questions"},
    ]},
  ]},
  {id:"s_dilr",name:"DILR",icon:"🔢",color:"#f59e0b",desc:"Data Interpretation & Logical Reasoning",topics:[
    {id:"t_di",name:"Data Interpretation",subtopics:[
      {id:"st_di_tab",name:"Tables"},{id:"st_di_bar",name:"Bar Charts"},
      {id:"st_di_pie",name:"Pie Charts"},{id:"st_di_line",name:"Line Graphs"},
      {id:"st_di_case",name:"Caselets"},
    ]},
    {id:"t_lr",name:"Logical Reasoning",subtopics:[
      {id:"st_lr_seat",name:"Seating Arrangement"},{id:"st_lr_blood",name:"Blood Relations"},
      {id:"st_lr_dir",name:"Direction Sense"},{id:"st_lr_syllog",name:"Syllogisms"},
      {id:"st_lr_puzzle",name:"Puzzles & Grids"},{id:"st_lr_binary",name:"Binary Logic"},
      {id:"st_lr_venn",name:"Venn Diagrams"},
    ]},
  ]},
  {id:"s_quants",name:"Quants",icon:"🧮",color:"#22d4a0",desc:"Quantitative Aptitude",topics:[
    {id:"t_arith",name:"Arithmetic",subtopics:[
      {id:"st_pl",name:"Profit & Loss"},{id:"st_perc",name:"Percentages"},
      {id:"st_ratio",name:"Ratio & Proportion"},{id:"st_tw",name:"Time & Work"},
      {id:"st_tsd",name:"Time, Speed & Distance"},{id:"st_sci",name:"Simple & Compound Interest"},
      {id:"st_avg",name:"Averages & Mixtures"},{id:"st_partner",name:"Partnership"},
    ]},
    {id:"t_algebra",name:"Algebra",subtopics:[
      {id:"st_linear",name:"Linear Equations"},{id:"st_quad",name:"Quadratic Equations"},
      {id:"st_ineq",name:"Inequalities & Modulus"},{id:"st_func",name:"Functions & Graphs"},
      {id:"st_prog",name:"Progressions (AP/GP/HP)"},{id:"st_logs",name:"Logarithms"},
    ]},
    {id:"t_geo",name:"Geometry & Mensuration",subtopics:[
      {id:"st_tri",name:"Triangles"},{id:"st_circ",name:"Circles"},
      {id:"st_poly",name:"Polygons"},{id:"st_solid",name:"3D Solids"},
      {id:"st_coord",name:"Coordinate Geometry"},{id:"st_trig",name:"Trigonometry"},
    ]},
    {id:"t_modern",name:"Modern Math",subtopics:[
      {id:"st_pc",name:"Permutation & Combination"},{id:"st_prob",name:"Probability"},
      {id:"st_sets",name:"Set Theory"},{id:"st_numth",name:"Number Theory"},
      {id:"st_surds",name:"Surds & Indices"},
    ]},
  ]},
];

/* ── UTILS ────────────────────────────────────────── */
const uid=()=>Math.random().toString(36).slice(2,9);
const DAY=86400000;
const day0=()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();};
const addDays=(ts,d)=>ts+d*DAY;
const daysUntil=(ts)=>Math.round((ts-day0())/DAY);
const fmtDate=(ts)=>ts?new Date(ts).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):"—";
const fmtShort=(ts)=>ts?new Date(ts).toLocaleDateString("en-IN",{day:"numeric",month:"short"}):"—";
const deepClone=(v)=>JSON.parse(JSON.stringify(v));

/* ── STORAGE ──────────────────────────────────────── */
const ls={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}},
};

/* ── THEME COLORS ─────────────────────────────────── */
const DARK={
  bg:"#0a0b16",surf:"#12131e",surf2:"#1c1d2c",surf3:"#22233a",
  border:"rgba(139,127,255,0.13)",border2:"rgba(139,127,255,0.22)",
  text:"#e8e8f4",muted:"#6b6b90",accent:"#8b7fff",accentSoft:"rgba(139,127,255,0.13)",
  green:"#22d4a0",greenSoft:"rgba(34,212,160,0.13)",amber:"#f59e0b",amberSoft:"rgba(245,158,11,0.13)",
  red:"#f43f5e",redSoft:"rgba(244,63,94,0.13)",
};
const LIGHT={
  bg:"#f4f4ff",surf:"#ffffff",surf2:"#ebebff",surf3:"#e0e0ff",
  border:"rgba(100,90,200,0.12)",border2:"rgba(100,90,200,0.25)",
  text:"#1a1a30",muted:"#6666aa",accent:"#6b55f0",accentSoft:"rgba(107,85,240,0.1)",
  green:"#059669",greenSoft:"rgba(5,150,105,0.1)",amber:"#d97706",amberSoft:"rgba(217,119,6,0.1)",
  red:"#e11d48",redSoft:"rgba(225,29,72,0.1)",
};

/* ── SHARED STYLES ─────────────────────────────────── */
const btn=(c,variant="accent",full=false)=>({
  background:variant==="accent"?`linear-gradient(135deg,${c.accent},${c.accent}cc)`:variant==="success"?`linear-gradient(135deg,${c.green},${c.green}cc)`:variant==="ghost"?"transparent":c.surf2,
  border:variant==="ghost"?`1.5px solid ${c.border2}`:"none",
  color:variant==="ghost"?c.text:"#fff",
  borderRadius:14,padding:"13px 20px",fontWeight:700,fontSize:15,cursor:"pointer",
  width:full?"100%":"auto",transition:"all .15s",
});
const card=(c)=>({
  background:c.surf,border:`1px solid ${c.border}`,borderRadius:18,padding:"16px 18px",
  marginBottom:12,transition:"all .2s",
});
const inp=(c)=>({
  background:c.surf2,border:`1.5px solid ${c.border}`,borderRadius:13,
  padding:"13px 15px",color:c.text,fontSize:15,width:"100%",
  transition:"border-color .2s",
});
const badge=(color,soft)=>({
  background:soft,color:color,borderRadius:8,padding:"3px 9px",
  fontSize:11,fontWeight:700,letterSpacing:.4,whiteSpace:"nowrap",
});

/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */
function App(){
  const [loading,setLoading]=useState(true);
  const [theme,setTheme]=useState("dark");
  const [onboarded,setOnboarded]=useState(false);
  const [tab,setTab]=useState("home");

  const [user,setUser]=useState({name:"",emoji:"🎓"});
  const [exams,setExams]=useState([]);
  const [sections,setSections]=useState([]);
  const [std,setStd]=useState({}); // subtopic data keyed by id
  const [revLog,setRevLog]=useState([]);
  

  const c=theme==="dark"?DARK:LIGHT;

  useEffect(()=>{
    const u=ls.get("re_user"),e=ls.get("re_exams"),s=ls.get("re_sections"),
          sd=ls.get("re_std"),rl=ls.get("re_revlog"),ob=ls.get("re_onboarded"),
          th=ls.get("re_theme");
    if(u)setUser(u);if(e)setExams(e);if(s)setSections(s);
    if(sd)setStd(sd);if(rl)setRevLog(rl);if(ob)setOnboarded(true);
    if(th)setTheme(th);
    setLoading(false);
  },[]);

  const sv={
    user:(v)=>{setUser(v);ls.set("re_user",v);},
    exams:(v)=>{setExams(v);ls.set("re_exams",v);},
    sections:(v)=>{setSections(v);ls.set("re_sections",v);},
    std:(v)=>{setStd(v);ls.set("re_std",v);},
    revLog:(v)=>{setRevLog(v);ls.set("re_revlog",v);},
    apiKey:(v)=>{ls.set("re_apikey",v);},
    theme:(v)=>{setTheme(v);ls.set("re_theme",v);},
  };

  const finishOnboarding=(data)=>{
    sv.user(data.user);sv.exams(data.exams);sv.sections(data.sections);
    ls.set("re_onboarded",true);setOnboarded(true);
  };

  const markLearned=(sid)=>{
    const t=day0();
    const n={...std,[sid]:{stage:1,learnedAt:t,lastRevised:t,nextDue:addDays(t,INTERVALS[0]),history:[t],notes:std[sid]?.notes||"",tags:std[sid]?.tags||[]}};
    sv.std(n);
  };

  const markRevised=(sid,sname)=>{
    const t=day0(),cur=std[sid];if(!cur)return;
    const ns=Math.min(cur.stage+1,INTERVALS.length+1);
    const mastered=ns>INTERVALS.length;
    const nextDue=mastered?null:addDays(t,INTERVALS[ns-1]);
    sv.std({...std,[sid]:{...cur,stage:ns,lastRevised:t,nextDue,history:[...(cur.history||[]),t]}});
    sv.revLog([{date:t,sid,name:sname||sid},...revLog].slice(0,1000));
  };

  const updateNotes=(sid,notes)=>{
    sv.std({...std,[sid]:{...(std[sid]||{stage:0}),notes}});
  };

  const getDue=useCallback(()=>{
    const t=day0(),due=[];
    for(const sec of sections){for(const top of sec.topics||[]){for(const sub of top.subtopics||[]){
      const d=std[sub.id];
      if(d&&d.nextDue!=null&&d.nextDue<=t&&d.stage<=INTERVALS.length)
        due.push({...sub,section:sec,topic:top,data:d});
    }}}
    return due.sort((a,b)=>a.data.nextDue-b.data.nextDue);
  },[sections,std]);

  const getStreak=useCallback(()=>{
    if(!revLog.length)return 0;
    const days=new Set(revLog.map(r=>r.date));
    let streak=0,check=day0();
    while(days.has(check)){streak++;check=addDays(check,-1);}
    return streak;
  },[revLog]);

  if(loading)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:c.bg,transition:"background .3s"}}>
      <div style={{fontSize:52,animation:"pop .5s ease"}}>📚</div>
      <div style={{color:"#8b7fff",fontSize:28,fontWeight:800,marginTop:12,letterSpacing:-1}}>RevEdge</div>
      <div style={{color:c.muted,fontSize:13,marginTop:6}}>Your Revision. Your Edge.</div>
    </div>
  );

  if(!onboarded)return <Onboarding onComplete={finishOnboarding}/>;

  const due=getDue();
  const toggleTheme=()=>sv.theme(theme==="dark"?"light":"dark");
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:c.bg,color:c.text,overflow:"hidden",position:"relative"}}>
      {/* Global theme toggle — always visible top-right */}
      <div style={{position:"fixed",top:14,right:16,zIndex:999}}>
        <ThemeToggle theme={theme} toggle={toggleTheme} c={c}/>
      </div>
      <div style={{flex:1,overflowY:"auto",minHeight:0}}>
        {tab==="home"&&<HomeTab user={user} exams={exams} due={due} streak={getStreak()} sections={sections} std={std} revLog={revLog} c={c} theme={theme} markRevised={markRevised}/>}
        {tab==="subjects"&&<SubjectsTab sections={sections} setSections={sv.sections} std={std} markLearned={markLearned} updateNotes={updateNotes} c={c}/>}
        {tab==="revise"&&<ReviseTab due={due} markRevised={markRevised} std={std} c={c}/>}
        {tab==="stats"&&<StatsTab sections={sections} std={std} revLog={revLog} exams={exams} streak={getStreak()} c={c}/>}
        {tab==="coach"&&<CoachTab c={c} sections={sections}/>}
      </div>
      <BottomBar tab={tab} setTab={setTab} dueCount={due.length} c={c}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ONBOARDING
═══════════════════════════════════════════════════════ */
function Onboarding({onComplete}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState("");
  const [emoji,setEmoji]=useState("🎓");
  const [selExams,setSelExams]=useState([]);
  const [dates,setDates]=useState({});
  const [usePreset,setUsePreset]=useState(true);
  const [anim,setAnim]=useState(true);
  const A="#8b7fff",BG="#0a0b16",SURF="#12131e",TXT="#e8e8f4",MUT="#6b6b90";

  const go=(n)=>{setAnim(false);setTimeout(()=>{setStep(n);setAnim(true);},150);};
  const toggleExam=(ex)=>setSelExams(p=>p.find(e=>e.id===ex.id)?p.filter(e=>e.id!==ex.id):[...p,ex]);
  const finish=()=>{
    onComplete({
      user:{name:name.trim(),emoji},
      exams:selExams.map((e,i)=>({...e,priority:i,date:dates[e.id]||null})),
      sections:usePreset?deepClone(DEFAULT_SECTIONS):[],
    });
  };

  return(
    <div style={{height:"100vh",background:BG,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Progress */}
      <div style={{padding:"52px 24px 0",display:"flex",gap:6}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{flex:1,height:3,borderRadius:3,background:i<=step?A:"#22233a",transition:"background .4s"}}/>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"28px 24px 16px",opacity:anim?1:0,transition:"opacity .15s"}}>
        {step===0&&(
          <div className="fade-up">
            <div style={{fontSize:52,textAlign:"center",marginBottom:8}}>👋</div>
            <h1 style={{color:TXT,fontSize:27,fontWeight:800,textAlign:"center",marginBottom:6,letterSpacing:-1}}>Welcome to RevEdge</h1>
            <p style={{color:MUT,fontSize:14,textAlign:"center",marginBottom:32,lineHeight:1.7}}>Your smart spaced-repetition companion for cracking any competitive exam</p>
            <label style={{color:MUT,fontSize:11,fontWeight:700,letterSpacing:1.2,display:"block",marginBottom:8}}>YOUR NAME</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Enter your name…" style={{...inp({surf2:SURF,border:"rgba(139,127,255,0.2)",text:TXT}),marginBottom:24}} autoFocus/>
            <label style={{color:MUT,fontSize:11,fontWeight:700,letterSpacing:1.2,display:"block",marginBottom:12}}>CHOOSE YOUR AVATAR</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:24}}>
              {EMOJIS.map(e=>(
                <button key={e} onClick={()=>setEmoji(e)} style={{width:50,height:50,borderRadius:13,border:`2px solid ${emoji===e?A:"transparent"}`,background:emoji===e?`${A}22`:SURF,fontSize:22,cursor:"pointer",transition:"all .2s"}} className="tap">{e}</button>
              ))}
            </div>
            {name.trim()&&(
              <div style={{background:`${A}15`,border:`1px solid ${A}33`,borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:14}} className="fade-in">
                <div style={{fontSize:40}}>{emoji}</div>
                <div>
                  <div style={{color:TXT,fontWeight:700,fontSize:18}}>Hi, {name.trim()}!</div>
                  <div style={{color:MUT,fontSize:13,marginTop:2}}>Let's get you exam-ready 🚀</div>
                </div>
              </div>
            )}
          </div>
        )}

        {step===1&&(
          <div className="fade-up">
            <div style={{fontSize:48,textAlign:"center",marginBottom:8}}>🎯</div>
            <h1 style={{color:TXT,fontSize:25,fontWeight:800,textAlign:"center",marginBottom:6,letterSpacing:-1}}>Target Exams</h1>
            <p style={{color:MUT,fontSize:13,textAlign:"center",marginBottom:24,lineHeight:1.7}}>Select all exams you're preparing for.<br/>First selected = Primary (shown largest on Home).</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              {EXAM_LIST.map(ex=>{
                const sel=selExams.find(e=>e.id===ex.id);
                const pri=selExams.findIndex(e=>e.id===ex.id);
                return(
                  <button key={ex.id} onClick={()=>toggleExam(ex)} style={{background:sel?`${A}18`:SURF,border:`1.5px solid ${sel?A:"rgba(139,127,255,0.12)"}`,borderRadius:14,padding:"12px 14px",cursor:"pointer",textAlign:"left",position:"relative",transition:"all .2s"}} className="tap">
                    <div style={{fontSize:22}}>{ex.icon}</div>
                    <div style={{color:TXT,fontWeight:700,fontSize:15,marginTop:4}}>{ex.name}</div>
                    <div style={{color:MUT,fontSize:11,lineHeight:1.3}}>{ex.full}</div>
                    {sel&&<div style={{position:"absolute",top:8,right:8,background:A,color:"#fff",borderRadius:6,width:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>{pri+1}</div>}
                  </button>
                );
              })}
            </div>
            {selExams.length>0&&(
              <>
                <div style={{color:MUT,fontSize:11,fontWeight:700,letterSpacing:1.2,marginBottom:12}}>EXAM DATES (OPTIONAL)</div>
                {selExams.map((ex,i)=>(
                  <div key={ex.id} style={{display:"flex",alignItems:"center",gap:10,background:SURF,borderRadius:12,padding:"10px 14px",marginBottom:8}}>
                    <span style={{fontSize:18}}>{ex.icon}</span>
                    <span style={{color:TXT,fontWeight:600,flex:1,fontSize:14}}>{ex.name}</span>
                    {i===0&&<span style={{color:A,fontSize:10,fontWeight:800,letterSpacing:.8}}>PRIMARY</span>}
                    {i===1&&<span style={{color:"#f59e0b",fontSize:10,fontWeight:800,letterSpacing:.8}}>2ND</span>}
                    {i===2&&<span style={{color:"#22d4a0",fontSize:10,fontWeight:800,letterSpacing:.8}}>3RD</span>}
                    <input type="date" value={dates[ex.id]||""} onChange={e=>setDates(p=>({...p,[ex.id]:e.target.value}))} style={{background:"transparent",color:MUT,fontSize:12,cursor:"pointer"}}/>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {step===2&&(
          <div className="fade-up">
            <div style={{fontSize:48,textAlign:"center",marginBottom:8}}>📚</div>
            <h1 style={{color:TXT,fontSize:25,fontWeight:800,textAlign:"center",marginBottom:6,letterSpacing:-1}}>Setup Subjects</h1>
            <p style={{color:MUT,fontSize:13,textAlign:"center",marginBottom:24,lineHeight:1.7}}>Start with a preset or build your own syllabus from scratch. You can always add more later.</p>
            {[
              {val:true,icon:"⚡",title:"Load CAT/GMAT Preset",desc:"VARC · DILR · Quants with 20+ subtopics ready"},
              {val:false,icon:"✏️",title:"Start from Scratch",desc:"Build your own custom syllabus section by section"},
            ].map(opt=>(
              <button key={String(opt.val)} onClick={()=>setUsePreset(opt.val)} style={{width:"100%",background:usePreset===opt.val?`${A}18`:SURF,border:`1.5px solid ${usePreset===opt.val?A:"rgba(139,127,255,0.12)"}`,borderRadius:16,padding:"16px 18px",cursor:"pointer",textAlign:"left",marginBottom:12,transition:"all .2s"}} className="tap">
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <span style={{fontSize:28}}>{opt.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{color:TXT,fontWeight:700,fontSize:16}}>{opt.title}</div>
                    <div style={{color:MUT,fontSize:13,marginTop:2}}>{opt.desc}</div>
                  </div>
                  {usePreset===opt.val&&<div style={{color:A,fontSize:22,fontWeight:800}}>✓</div>}
                </div>
              </button>
            ))}
            {usePreset&&(
              <div style={{background:SURF,borderRadius:14,padding:16,marginTop:8}}>
                {DEFAULT_SECTIONS.map(sec=>(
                  <div key={sec.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(139,127,255,0.08)"}}>
                    <span style={{fontSize:22}}>{sec.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{color:TXT,fontWeight:700,fontSize:14}}>{sec.name}</div>
                      <div style={{color:MUT,fontSize:12}}>{sec.topics.reduce((a,t)=>a+t.subtopics.length,0)} subtopics across {sec.topics.length} topics</div>
                    </div>
                    <span style={{color:"#22d4a0",fontSize:13,fontWeight:700}}>✓ Ready</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{padding:"12px 24px 36px",display:"flex",gap:10}}>
        {step>0&&<button onClick={()=>go(step-1)} style={{flex:1,...btn({accent:"#8b7fff"},"ghost"),borderColor:"rgba(139,127,255,0.25)",color:TXT}} className="tap">← Back</button>}
        {step<2
          ?<button onClick={()=>go(step+1)} disabled={step===0&&!name.trim()} style={{flex:2,background:(!name.trim()&&step===0)?"#22233a":`linear-gradient(135deg,${A},${A}cc)`,border:"none",borderRadius:14,padding:14,color:"#fff",fontWeight:700,fontSize:15,cursor:(!name.trim()&&step===0)?"not-allowed":"pointer",opacity:(!name.trim()&&step===0)?.4:1,transition:"all .2s"}} className="tap">Continue →</button>
          :<button onClick={finish} disabled={selExams.length===0} style={{flex:2,background:selExams.length===0?"#22233a":"linear-gradient(135deg,#22d4a0,#059669)",border:"none",borderRadius:14,padding:14,color:"#fff",fontWeight:700,fontSize:15,cursor:selExams.length===0?"not-allowed":"pointer",opacity:selExams.length===0?.4:1,transition:"all .2s"}} className="tap">🚀 Launch RevEdge!</button>
        }
      </div>
    </div>
  );
}

/* ── THEME TOGGLE ─────────────────────────────────────── */
function ThemeToggle({theme,toggle,c}){
  const dark=theme==="dark";
  return(
    <button onClick={toggle} style={{
      background:dark?"linear-gradient(135deg,#1c1d2c,#22233a)":"linear-gradient(135deg,#e8e8ff,#f0f0ff)",

      borderRadius:50,cursor:"pointer",
      display:"flex",alignItems:"center",position:"relative",width:68,height:36,

      transition:"all .3s",flexShrink:0,

      <div style={{width:36,height:36,borderRadius:10,background:sub.section.color+"22",border:`1.5px solid ${sub.section.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{sub.section.icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:c.text,fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub.name}</div>

/* ═══════════════════════════════════════════════════════
   SUBJECTS TAB
═══════════════════════════════════════════════════════ */
function SubjectsTab({sections,setSections,std,markLearned,updateNotes,c}){
  const [expanded,setExpanded]=useState({});
  const [modal,setModal]=useState(null); // {type:'addSection'|'addTopic'|'addSubtopic'|'editSubtopic'|'notes', ...data}
  const [search,setSearch]=useState("");

  const toggle=(id)=>setExpanded(p=>({...p,[id]:!p[id]}));

  const addSection=(name,icon,color)=>{
    setSections([...sections,{id:"s_"+uid(),name,icon:icon||"📁",color:color||c.accent,desc:"",topics:[]}]);
    setModal(null);
  };
  const delSection=(sid)=>{if(confirm("Delete this section and all its topics?"))setSections(sections.filter(s=>s.id!==sid));};
  const addTopic=(secId,name)=>{
    setSections(sections.map(s=>s.id===secId?{...s,topics:[...s.topics,{id:"t_"+uid(),name,subtopics:[]}]}:s));
    setModal(null);
  };
  const delTopic=(secId,tid)=>{setSections(sections.map(s=>s.id===secId?{...s,topics:s.topics.filter(t=>t.id!==tid)}:s));};
  const addSubtopic=(secId,tid,name)=>{
    setSections(sections.map(s=>s.id===secId?{...s,topics:s.topics.map(t=>t.id===tid?{...t,subtopics:[...t.subtopics,{id:"st_"+uid(),name}]}:t)}:s));
    setModal(null);
  };
  const delSubtopic=(secId,tid,stid)=>{setSections(sections.map(s=>s.id===secId?{...s,topics:s.topics.map(t=>t.id===tid?{...t,subtopics:t.subtopics.filter(st=>st.id!==stid)}:t)}:s));};
  const editSubtopicName=(secId,tid,stid,name)=>{
    setSections(sections.map(s=>s.id===secId?{...s,topics:s.topics.map(t=>t.id===tid?{...t,subtopics:t.subtopics.map(st=>st.id===stid?{...st,name}:st)}:t)}:s));
  };

  const filtered=search?sections.map(s=>({...s,topics:s.topics.map(t=>({...t,subtopics:t.subtopics.filter(st=>st.name.toLowerCase().includes(search.toLowerCase()))})).filter(t=>t.subtopics.length||t.name.toLowerCase().includes(search.toLowerCase()))})).filter(s=>s.topics.length||s.name.toLowerCase().includes(search.toLowerCase())):sections;

  return(
    <div style={{padding:"56px 20px 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{color:c.text,fontSize:20,fontWeight:800,letterSpacing:-0.5}}>Subjects</div>
        <button onClick={()=>setModal({type:"addSection"})} style={{background:`linear-gradient(135deg,${c.accent},${c.accent}cc)`,border:"none",borderRadius:12,padding:"8px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}} className="tap">+ Section</button>
      </div>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search topics…" style={{...inp(c),marginBottom:16}}/>

      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:40}}>📭</div>
          <div style={{color:c.muted,marginTop:12,fontSize:14}}>No subjects yet. Add a section to get started.</div>
        </div>
      )}

      {filtered.map(sec=>(
        <div key={sec.id} style={{marginBottom:12}}>
          {/* Section header */}
          <div style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:16,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",padding:"14px 16px",cursor:"pointer"}} onClick={()=>toggle(sec.id)}>
              <div style={{width:36,height:36,borderRadius:10,background:sec.color+"22",border:`1.5px solid ${sec.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,marginRight:12,flexShrink:0}}>{sec.icon}</div>
              <div style={{flex:1}}>
                <div style={{color:c.text,fontWeight:700,fontSize:16}}>{sec.name}</div>
                <div style={{color:c.muted,fontSize:11,marginTop:1}}>{sec.topics.reduce((a,t)=>a+t.subtopics.length,0)} subtopics · {sec.topics.reduce((a,t)=>a+t.subtopics.filter(s=>std[s.id]&&std[s.id].stage>0).length,0)} learned</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={e=>{e.stopPropagation();setModal({type:"addTopic",secId:sec.id});}} style={{background:c.accentSoft,border:"none",borderRadius:8,padding:"5px 10px",color:c.accent,fontWeight:700,fontSize:11,cursor:"pointer"}} className="tap">+ Topic</button>
                <button onClick={e=>{e.stopPropagation();delSection(sec.id);}} style={{background:c.redSoft,border:"none",borderRadius:8,padding:"5px 8px",color:c.red,fontWeight:700,fontSize:11,cursor:"pointer"}} className="tap">🗑</button>
                <div style={{color:c.muted,fontSize:16,transition:"transform .2s",transform:expanded[sec.id]?"rotate(180deg)":"rotate(0deg)"}}>▾</div>
              </div>
            </div>

            {expanded[sec.id]&&sec.topics.map(top=>(
              <div key={top.id} style={{borderTop:`1px solid ${c.border}`}}>
                {/* Topic row */}
                <div style={{display:"flex",alignItems:"center",padding:"10px 16px 10px 20px",background:c.surf2}}>
                  <div style={{width:3,height:20,background:sec.color,borderRadius:2,marginRight:12}}/>
                  <div style={{color:c.text,fontWeight:600,fontSize:14,flex:1}}>{top.name}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setModal({type:"addSubtopic",secId:sec.id,tid:top.id})} style={{background:"transparent",border:`1px solid ${c.border2}`,borderRadius:7,padding:"4px 9px",color:c.muted,fontSize:11,cursor:"pointer"}} className="tap">+ Sub</button>
                    <button onClick={()=>delTopic(sec.id,top.id)} style={{background:"transparent",border:"none",color:c.red,fontSize:13,cursor:"pointer",padding:"4px 6px"}} className="tap">✕</button>
                  </div>
                </div>

                {/* Subtopics */}
                {top.subtopics.map(sub=>{
                  const d=std[sub.id];
                  const stage=d?d.stage:0;
                  const meta=STAGE_META[Math.min(stage,STAGE_META.length-1)];
                  return(
                    <SubtopicRow key={sub.id} sub={sub} secId={sec.id} tid={top.id} stage={stage} meta={meta} d={d} c={c}
                      onLearn={()=>markLearned(sub.id)} onDel={()=>delSubtopic(sec.id,top.id,sub.id)}
                      onEdit={(name)=>editSubtopicName(sec.id,top.id,sub.id,name)}
                      onNotes={()=>setModal({type:"notes",sub,secId:sec.id,tid:top.id})}
                    />
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* Modals */}
      {modal&&<Modal modal={modal} setModal={setModal} c={c} addSection={addSection} addTopic={addTopic} addSubtopic={addSubtopic} std={std} updateNotes={updateNotes}/>}
    </div>
  );
}

function SubtopicRow({sub,secId,tid,stage,meta,d,c,onLearn,onDel,onEdit,onNotes}){
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState(sub.name);
  const [swiped,setSwiped]=useState(false);
  const startX=useRef(null);

  const handleTouchStart=(e)=>{startX.current=e.touches[0].clientX;};
  const handleTouchEnd=(e)=>{
    if(startX.current===null)return;
    const dx=e.changedTouches[0].clientX-startX.current;
    if(dx<-60)setSwiped(true);
    else if(dx>60)setSwiped(false);
    startX.current=null;
  };

  const saveEdit=()=>{if(editVal.trim())onEdit(editVal.trim());setEditing(false);};

  return(
    <div style={{position:"relative",overflow:"hidden"}} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      {/* Delete action (revealed on swipe left) */}
      <div style={{position:"absolute",right:0,top:0,bottom:0,display:"flex",alignItems:"center",padding:"0 12px",background:c.red}}>
        <button onClick={onDel} style={{background:"none",border:"none",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Delete</button>
      </div>
      <div style={{display:"flex",alignItems:"center",padding:"9px 16px 9px 36px",borderTop:`1px solid ${c.border}`,background:c.surf,transform:swiped?"translateX(-80px)":"translateX(0)",transition:"transform .25s",position:"relative",zIndex:1}}>
        <div style={{flex:1,minWidth:0}}>
          {editing?(
            <div style={{display:"flex",gap:8}}>
              <input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit()} style={{...inp(c),padding:"6px 10px",fontSize:13,flex:1}} autoFocus/>
              <button onClick={saveEdit} style={{background:c.accentSoft,border:"none",borderRadius:8,padding:"6px 10px",color:c.accent,fontWeight:700,fontSize:12,cursor:"pointer"}}>Save</button>
            </div>
          ):(
            <div style={{color:c.text,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub.name}</div>
          )}
          {d&&d.nextDue&&stage<=INTERVALS.length&&(
            <div style={{color:c.muted,fontSize:11,marginTop:2}}>
              Next: {daysUntil(d.nextDue)>0?`in ${daysUntil(d.nextDue)} days`:daysUntil(d.nextDue)===0?"Today":"Overdue!"} · {fmtShort(d.nextDue)}
            </div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:8}}>
          <div style={{...badge(meta.color,meta.color+"22"),fontSize:10}}>{meta.label}</div>
          {stage===0?(
            <button onClick={onLearn} style={{background:c.accentSoft,border:"none",borderRadius:8,padding:"5px 10px",color:c.accent,fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}} className="tap">Mark Learned</button>
          ):(
            <button onClick={onNotes} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:8,padding:"5px 8px",color:c.muted,fontSize:12,cursor:"pointer"}} className="tap">📝</button>
          )}
          <button onClick={()=>{setEditing(!editing);setEditVal(sub.name);}} style={{background:"transparent",border:"none",color:c.muted,fontSize:14,cursor:"pointer",padding:"4px"}} className="tap">✏️</button>
        </div>
      </div>
    </div>
  );
}

function Modal({modal,setModal,c,addSection,addTopic,addSubtopic,std,updateNotes}){
  const [val,setVal]=useState("");
  const [icon,setIcon]=useState("📁");
  const [color,setColor]=useState("#8b7fff");
  const [notes,setNotes]=useState(modal.type==="notes"?std[modal.sub?.id]?.notes||"":"");
  const COLORS=["#8b7fff","#22d4a0","#f59e0b","#f43f5e","#3b82f6","#ec4899","#14b8a6","#f97316"];
  const ICONS=["📁","📖","🔢","🧮","🧬","⚗️","📐","💡","🌐","⚙️","📊","🎯","🔬","📝","🏛️","💼"];

  const submit=()=>{
    if(modal.type==="addSection")addSection(val.trim(),icon,color);
    else if(modal.type==="addTopic")addTopic(modal.secId,val.trim());
    else if(modal.type==="addSubtopic")addSubtopic(modal.secId,modal.tid,val.trim());
    else if(modal.type==="notes"){updateNotes(modal.sub.id,notes);setModal(null);}
    if(val.trim()&&modal.type!=="notes")setVal("");
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div style={{background:c.surf,borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxHeight:"80vh",overflowY:"auto"}} className="fade-up">
        <div style={{width:36,height:4,background:c.border2,borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{color:c.text,fontWeight:800,fontSize:18,marginBottom:16}}>
          {modal.type==="addSection"?"New Section":modal.type==="addTopic"?"New Topic":modal.type==="addSubtopic"?"New Subtopic":"Formula Notes"}
        </div>

        {modal.type==="notes"?(
          <>
            <div style={{color:c.text,fontWeight:700,fontSize:15,marginBottom:8}}>{modal.sub?.name}</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add your formulae, key points, shortcuts…" rows={8} style={{...inp(c),resize:"vertical",lineHeight:1.7,fontSize:14}}/>
            <div style={{color:c.muted,fontSize:12,marginTop:6}}>📸 Upload images from Subjects → edit mode (coming with backend setup)</div>
          </>
        ):(
          <>
            <input value={val} onChange={e=>setVal(e.target.value)} placeholder={modal.type==="addSection"?"Section name…":modal.type==="addTopic"?"Topic name…":"Subtopic name…"} style={{...inp(c),marginBottom:16}} autoFocus onKeyDown={e=>e.key==="Enter"&&val.trim()&&submit()}/>
            {modal.type==="addSection"&&(
              <>
                <div style={{color:c.muted,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}}>ICON</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                  {ICONS.map(ic=><button key={ic} onClick={()=>setIcon(ic)} style={{width:40,height:40,borderRadius:10,border:`2px solid ${icon===ic?c.accent:"transparent"}`,background:icon===ic?c.accentSoft:c.surf2,fontSize:20,cursor:"pointer"}} className="tap">{ic}</button>)}
                </div>
                <div style={{color:c.muted,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}}>COLOR</div>
                <div style={{display:"flex",gap:8,marginBottom:16}}>
                  {COLORS.map(col=><button key={col} onClick={()=>setColor(col)} style={{width:32,height:32,borderRadius:8,background:col,border:`3px solid ${color===col?"#fff":"transparent"}`,cursor:"pointer"}} className="tap"/>)}
                </div>
              </>
            )}
          </>
        )}

        <button onClick={submit} disabled={modal.type!=="notes"&&!val.trim()} style={{...btn(c,"accent",true),marginTop:12,opacity:modal.type!=="notes"&&!val.trim()?.5:1}} className="tap">
          {modal.type==="notes"?"Save Notes ✓":"Add →"}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   REVISION TAB
═══════════════════════════════════════════════════════ */
function ReviseTab({due,markRevised,std,c}){
  const [done,setDone]=useState(new Set());
  const [expanded,setExpanded]=useState(null);

  const handleDone=(sub)=>{
    markRevised(sub.id,sub.name);
    setDone(p=>new Set([...p,sub.id]));
  };

  const remaining=due.filter(s=>!done.has(s.id));
  const pct=due.length?Math.round(done.size/due.length*100):100;

  return(
    <div style={{padding:"56px 20px 20px"}}>
      <div style={{color:c.text,fontSize:20,fontWeight:800,letterSpacing:-0.5,marginBottom:4}}>Today's Revision</div>
      <div style={{color:c.muted,fontSize:13,marginBottom:20}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"})}</div>

      {/* Progress bar */}
      <div style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:16,padding:"14px 16px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <span style={{color:c.text,fontWeight:700,fontSize:14}}>Progress</span>
          <span style={{color:pct===100?c.green:c.accent,fontWeight:800,fontSize:14}}>{done.size}/{due.length} done</span>
        </div>
        <div style={{height:8,background:c.surf2,borderRadius:8,overflow:"hidden"}}>
          <div style={{height:"100%",background:pct===100?`linear-gradient(90deg,${c.green},#059669)`:`linear-gradient(90deg,${c.accent},${c.green})`,borderRadius:8,width:`${pct}%`,transition:"width .5s ease"}}/>
        </div>
        {pct===100&&<div style={{color:c.green,textAlign:"center",fontWeight:700,fontSize:14,marginTop:10}}>🎉 All done for today!</div>}
      </div>

      {remaining.length===0&&due.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:52,marginBottom:12}}>🌴</div>
          <div style={{color:c.text,fontWeight:700,fontSize:18}}>Nothing due today!</div>
          <div style={{color:c.muted,fontSize:14,marginTop:6,lineHeight:1.6}}>Mark subtopics as learned in the Subjects tab to start your revision schedule.</div>
        </div>
      )}

      {remaining.map(sub=>{
        const d=sub.data;
        const overdue=daysUntil(d.nextDue)<0;
        const notes=std[sub.id]?.notes||"";
        const isExp=expanded===sub.id;
        return(
          <div key={sub.id} style={{background:c.surf,border:`1.5px solid ${overdue?c.red+"44":c.border}`,borderRadius:18,padding:"16px",marginBottom:12,transition:"all .2s"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{width:42,height:42,borderRadius:12,background:sub.section.color+"22",border:`1.5px solid ${sub.section.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{sub.section.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:c.text,fontWeight:700,fontSize:15}}>{sub.name}</div>
                <div style={{color:c.muted,fontSize:12,marginTop:2}}>{sub.section.name} › {sub.topic.name}</div>
                {/* Stage progress dots */}
                <div style={{display:"flex",gap:4,marginTop:8}}>
                  {INTERVALS.map((_, i)=>(
                    <div key={i} style={{height:4,flex:1,borderRadius:2,background:i<d.stage-1?c.green:i===d.stage-1?c.amber:c.surf2}}/>
                  ))}
                </div>
                <div style={{color:c.muted,fontSize:11,marginTop:4}}>
                  Stage {d.stage}/5 · Learned {fmtShort(d.learnedAt)} · 
                  {overdue?<span style={{color:c.red}}> {Math.abs(daysUntil(d.nextDue))}d overdue</span>:" Due today"}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              {notes&&(
                <button onClick={()=>setExpanded(isExp?null:sub.id)} style={{flex:1,background:c.surf2,border:`1px solid ${c.border}`,borderRadius:10,padding:"10px",color:c.muted,fontWeight:600,fontSize:13,cursor:"pointer"}} className="tap">
                  {isExp?"Hide":"📝 Notes"}
                </button>
              )}
              <button onClick={()=>handleDone(sub)} style={{flex:2,...btn(c,"success"),padding:"10px",fontSize:13,textAlign:"center",display:"block"}} className="tap">
                ✓ Revised!{d.stage>=INTERVALS.length?" → Mastered 🎉":`  (${INTERVALS[d.stage]}d next)`}
              </button>
            </div>
            {isExp&&notes&&(
              <div style={{marginTop:12,background:c.surf2,borderRadius:12,padding:"12px",color:c.text,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}} className="fade-in">
                {notes}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   STATS TAB
═══════════════════════════════════════════════════════ */
function StatsTab({sections,std,revLog,exams,streak,c}){
  const allSubs=sections.flatMap(s=>s.topics.flatMap(t=>t.subtopics));
  const total=allSubs.length;
  const learned=allSubs.filter(s=>std[s.id]&&std[s.id].stage>0).length;
  const mastered=allSubs.filter(s=>std[s.id]&&std[s.id].stage>INTERVALS.length).length;
  const mastPct=total?Math.round(mastered/total*100):0;
  const learnPct=total?Math.round(learned/total*100):0;

  // Weekly heatmap (last 35 days)
  const weeks=5,days=7;
  const today=day0();
  const heatCells=Array.from({length:weeks*days},(_,i)=>{
    const date=addDays(today,-(weeks*days-1-i));
    const count=revLog.filter(r=>r.date===date).length;
    return{date,count};
  });

  // Best streak
  const bestStreak=useMemo(()=>{
    const days2=new Set(revLog.map(r=>r.date));
    let best=0,cur=0,check=day0();
    // Simple approximation
    const sorted=[...days2].sort((a,b)=>b-a);
    let prev=null;
    for(const d of sorted){if(prev===null||prev-d===DAY){cur++;best=Math.max(best,cur);}else{cur=1;}prev=d;}
    return best;
  },[revLog]);

  return(
    <div style={{padding:"56px 20px 20px"}}>
      <div style={{color:c.text,fontSize:20,fontWeight:800,letterSpacing:-0.5,marginBottom:20}}>Analytics</div>

      {/* Big mastery ring */}
      <div style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:20,padding:"24px",marginBottom:16,display:"flex",alignItems:"center",gap:20}}>
        <MasteryRing pct={mastPct} color={c.green} size={90}/>
        <div>
          <div style={{color:c.muted,fontSize:12,fontWeight:700,letterSpacing:.8}}>OVERALL MASTERY</div>
          <div style={{color:c.text,fontSize:28,fontWeight:800,letterSpacing:-1}}>{mastPct}%</div>
          <div style={{color:c.muted,fontSize:13,marginTop:4}}>{mastered} mastered · {learned-mastered} in progress · {total-learned} new</div>
        </div>
      </div>

      {/* Streak cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        {[
          {label:"Current Streak",val:`${streak}🔥`,c2:c.amber},
          {label:"Best Streak",val:`${bestStreak}⭐`,c2:c.accent},
          {label:"Total Revised",val:revLog.length,c2:c.green},
        ].map(s=>(
          <div key={s.label} style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:14,padding:"12px",textAlign:"center"}}>
            <div style={{color:s.c2,fontSize:20,fontWeight:800}}>{s.val}</div>
            <div style={{color:c.muted,fontSize:10,fontWeight:600,marginTop:2,lineHeight:1.3}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Section breakdown */}
      <div style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:18,padding:"16px",marginBottom:16}}>
        <div style={{color:c.text,fontWeight:700,fontSize:15,marginBottom:14}}>Section Breakdown</div>
        <div style={{display:"flex",gap:16,justifyContent:"space-around"}}>
          {sections.map(sec=>{
            const tot=sec.topics.reduce((a,t)=>a+t.subtopics.length,0);
            const mast=sec.topics.reduce((a,t)=>a+t.subtopics.filter(s=>std[s.id]&&std[s.id].stage>INTERVALS.length).length,0);
            const lrn=sec.topics.reduce((a,t)=>a+t.subtopics.filter(s=>std[s.id]&&std[s.id].stage>0).length,0);
            const pct=tot?Math.round(mast/tot*100):0;
            return(
              <div key={sec.id} style={{textAlign:"center"}}>
                <MasteryRing pct={pct} color={sec.color} size={70}/>
                <div style={{color:c.text,fontWeight:700,fontSize:13,marginTop:6}}>{sec.icon} {sec.name}</div>
                <div style={{color:c.muted,fontSize:11,marginTop:2}}>{lrn}/{tot} learned</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Activity heatmap */}
      <div style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:18,padding:"16px",marginBottom:16}}>
        <div style={{color:c.text,fontWeight:700,fontSize:15,marginBottom:14}}>Revision Activity (35 days)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{color:c.muted,fontSize:10,textAlign:"center",fontWeight:700,marginBottom:2}}>{d}</div>)}
          {heatCells.map((cell,i)=>{
            const intensity=cell.count===0?0:cell.count===1?1:cell.count<=3?2:3;
            const bg=[c.surf2,c.accent+"44",c.accent+"88",c.accent][intensity];
            return(
              <div key={i} title={`${fmtShort(cell.date)}: ${cell.count} revisions`} style={{aspectRatio:1,borderRadius:4,background:bg,cursor:"default",transition:"background .2s"}}/>
            );
          })}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:10,justifyContent:"flex-end"}}>
          <span style={{color:c.muted,fontSize:11}}>Less</span>
          {[c.surf2,c.accent+"44",c.accent+"88",c.accent].map((bg,i)=><div key={i} style={{width:12,height:12,borderRadius:3,background:bg}}/>)}
          <span style={{color:c.muted,fontSize:11}}>More</span>
        </div>
      </div>

      {/* Spaced rep breakdown */}
      <div style={{background:c.surf,border:`1px solid ${c.border}`,borderRadius:18,padding:"16px"}}>
        <div style={{color:c.text,fontWeight:700,fontSize:15,marginBottom:12}}>Revision Stage Distribution</div>
        {STAGE_META.map((sm,i)=>{
          const count=allSubs.filter(s=>std[s.id]&&std[s.id].stage===i).length;
          const pct=total?Math.round(count/total*100):0;
          return(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:sm.color,fontSize:12,fontWeight:700}}>{sm.label}</span>
                <span style={{color:c.muted,fontSize:12}}>{count}</span>
              </div>
              <div style={{height:5,background:c.surf2,borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",background:sm.color,borderRadius:5,width:`${pct}%`,transition:"width .8s ease"}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MasteryRing({pct,color,size}){
  const r=size/2-6,circ=2*Math.PI*r,offset=circ*(1-pct/100);
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(128,128,200,0.12)" strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset .8s ease"}}/>
      <text x={size/2} y={size/2+2} textAnchor="middle" dominantBaseline="middle"
        style={{transform:`rotate(90deg) translateY(${-size/2}px) translateX(${size/2}px)`,fill:color,fontSize:size>80?16:13,fontWeight:800,fontFamily:"Sora"}}>{pct}%</text>
    </svg>
  );
}

      <div style={{padding:"10px 16px 24px",borderTop:`1px solid ${c.border}`,flexShrink:0,display:"flex",gap:10,alignItems:"flex-end"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask your doubt…" rows={1} style={{...inp(c),flex:1,resize:"none",lineHeight:1.6,padding:"11px 14px",fontSize:14}}/>
        <button onClick={()=>send()} disabled={!input.trim()||loading} style={{background:input.trim()&&!loading?`linear-gradient(135deg,${c.accent},${c.accent}cc)`:"#22233a",border:"none",borderRadius:12,width:44,height:44,cursor:input.trim()&&!loading?"pointer":"default",flexShrink:0,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",opacity:input.trim()&&!loading?1:.5}} className="tap">↑</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   BOTTOM BAR
═══════════════════════════════════════════════════════ */
function BottomBar({tab,setTab,dueCount,c}){
  const tabs=[
    {id:"home",icon:"🏠",label:"Home"},
    {id:"subjects",icon:"📚",label:"Subjects"},
    {id:"revise",icon:"🔄",label:"Revise"},
    {id:"stats",icon:"📊",label:"Stats"},
    {id:"coach",icon:"🤖",label:"Coach"},
  ];
  return(
    <div style={{background:c.surf,borderTop:`1px solid ${c.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom,16px)",flexShrink:0}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"10px 4px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}} className="tap">
          <div style={{fontSize:22,lineHeight:1}}>{t.icon}</div>
          <div style={{color:tab===t.id?c.accent:c.muted,fontSize:10,fontWeight:tab===t.id?700:500,transition:"color .2s"}}>{t.label}</div>
          {t.id==="revise"&&dueCount>0&&<div style={{position:"absolute",top:6,right:"50%",transform:"translateX(14px)",background:c.red,color:"#fff",borderRadius:10,minWidth:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{dueCount}</div>}
          {tab===t.id&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:3,background:c.accent,borderRadius:"3px 3px 0 0"}}/>}
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
